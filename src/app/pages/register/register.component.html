<p-toast position="top-right"></p-toast>

<div style="display:flex; justify-content:center; padding: 2rem;">
<p-card [style]="{ width: '100%', maxWidth: '480px' }">

  <ng-template pTemplate="header">
    <div style="text-align:center; font-size:1.4rem; font-weight:600;">
      Registro
    </div>
  </ng-template>

    <!-- Usuario -->
    <div style="margin-bottom:1rem;">
      <label for="usuario" style="display:block; margin-bottom:0.4rem; font-weight:600;">Usuario *</label>
      <p-iconfield>
        <p-inputicon styleClass="pi pi-user"></p-inputicon>
        <input pInputText id="usuario" [(ngModel)]="form.usuario"
          [ngClass]="{ 'ng-invalid ng-dirty': errores.usuario }"
          placeholder="Nombre de usuario" style="width:100%;" />
      </p-iconfield>
      <small class="p-error" *ngIf="errores.usuario">{{ errores.usuario }}</small>
    </div>

    <!-- Email -->
    <div style="margin-bottom:1rem;">
      <label for="email" style="display:block; margin-bottom:0.4rem; font-weight:600;">Email *</label>
      <p-iconfield>
        <p-inputicon styleClass="pi pi-envelope"></p-inputicon>
        <input pInputText id="email" [(ngModel)]="form.email"
          [ngClass]="{ 'ng-invalid ng-dirty': errores.email }"
          placeholder="correo@ejemplo.com" style="width:100%;" />
      </p-iconfield>
      <small class="p-error" *ngIf="errores.email">{{ errores.email }}</small>
    </div>

    <!-- Nombre Completo -->
    <div style="margin-bottom:1rem;">
      <label for="nombre" style="display:block; margin-bottom:0.4rem; font-weight:600;">Nombre Completo *</label>
      <p-iconfield>
        <p-inputicon styleClass="pi pi-id-card"></p-inputicon>
        <input pInputText id="nombre" [(ngModel)]="form.nombreCompleto"
          [ngClass]="{ 'ng-invalid ng-dirty': errores.nombreCompleto }"
          placeholder="Tu nombre completo" style="width:100%;" />
      </p-iconfield>
      <small class="p-error" *ngIf="errores.nombreCompleto">{{ errores.nombreCompleto }}</small>
    </div>

    <!-- Dirección -->
    <div style="margin-bottom:1rem;">
      <label for="direccion" style="display:block; margin-bottom:0.4rem; font-weight:600;">Dirección *</label>
      <p-iconfield>
        <p-inputicon styleClass="pi pi-map-marker"></p-inputicon>
        <input pInputText id="direccion" [(ngModel)]="form.direccion"
          [ngClass]="{ 'ng-invalid ng-dirty': errores.direccion }"
          placeholder="Tu dirección" style="width:100%;" />
      </p-iconfield>
      <small class="p-error" *ngIf="errores.direccion">{{ errores.direccion }}</small>
    </div>

    <!-- Fecha de Nacimiento -->
    <div style="margin-bottom:1rem;">
      <label for="fecha" style="display:block; margin-bottom:0.4rem; font-weight:600;">Fecha de Nacimiento *</label>
      <p-datepicker
        id="fecha"
        [(ngModel)]="form.fechaNacimiento"
        [ngClass]="{ 'ng-invalid ng-dirty': errores.fechaNacimiento }"
        dateFormat="yy-mm-dd"
        [showIcon]="true"
        placeholder="Selecciona una fecha"
        style="width:100%;">
      </p-datepicker>
      <small class="p-error" *ngIf="errores.fechaNacimiento">{{ errores.fechaNacimiento }}</small>
    </div>

    <!-- Teléfono -->
    <div style="margin-bottom:1rem;">
      <label for="telefono" style="display:block; margin-bottom:0.4rem; font-weight:600;">Teléfono *</label>
      <p-iconfield>
        <p-inputicon styleClass="pi pi-phone"></p-inputicon>
        <input pInputText id="telefono" [(ngModel)]="form.telefono"
          [ngClass]="{ 'ng-invalid ng-dirty': errores.telefono }"
          placeholder="10 dígitos" maxlength="10"
          (keypress)="$event.charCode >= 48 && $event.charCode <= 57"
          style="width:100%;" />
      </p-iconfield>
      <small class="p-error" *ngIf="errores.telefono">{{ errores.telefono }}</small>
    </div>

    <!-- Contraseña -->
    <div style="margin-bottom:1rem;">
      <label for="password" style="display:block; margin-bottom:0.4rem; font-weight:600;">Contraseña *</label>
      <p-password
        id="password"
        [(ngModel)]="form.password"
        [ngClass]="{ 'ng-invalid ng-dirty': errores.password }"
        placeholder="Contraseña"
        [toggleMask]="true"
        [feedback]="true"
        style="width:100%;">
      </p-password>
      <small class="p-error" *ngIf="errores.password">{{ errores.password }}</small>
    </div>

    <!-- Confirmar Contraseña -->
    <div style="margin-bottom:1.5rem;">
      <label for="confirmPassword" style="display:block; margin-bottom:0.4rem; font-weight:600;">Confirmar Contraseña *</label>
      <p-password
        id="confirmPassword"
        [(ngModel)]="form.confirmPassword"
        [ngClass]="{ 'ng-invalid ng-dirty': errores.confirmPassword }"
        placeholder="Confirma tu contraseña"
        [toggleMask]="true"
        [feedback]="false"
        style="width:100%;">
      </p-password>
      <small class="p-error" *ngIf="errores.confirmPassword">{{ errores.confirmPassword }}</small>
    </div>

    <!-- Botón -->
    <div style="text-align:center; margin-top:1rem;">
      <p-button
        label="Registrarse"
        icon="pi pi-check"
        styleClass="p-button-primary"
        [loading]="cargando"
        (onClick)="registrar()">
      </p-button>
    </div>
    <p-divider></p-divider>

    <p style="text-align:center; margin:0;">
      ¿Ya tienes cuenta?
      <a routerLink="/login" style="color:var(--primary-color); text-decoration:none; font-weight:600;">Inicia sesión</a>
    </p>

  </p-card>
</div>
