<p-toast position="top-right" />

<div class="container">
  <div class="card">
    <h2>Registro</h2>

    <div class="campo">
      <label>Usuario *</label>
      <input type="text" [(ngModel)]="form.usuario" placeholder="Nombre de usuario" />
      <small class="error" *ngIf="errores.usuario">{{ errores.usuario }}</small>
    </div>

    <div class="campo">
      <label>Email *</label>
      <input type="email" [(ngModel)]="form.email" placeholder="correo@ejemplo.com" />
      <small class="error" *ngIf="errores.email">{{ errores.email }}</small>
    </div>

    <div class="campo">
      <label>Nombre Completo *</label>
      <input type="text" [(ngModel)]="form.nombreCompleto" placeholder="Tu nombre completo" />
      <small class="error" *ngIf="errores.nombreCompleto">{{ errores.nombreCompleto }}</small>
    </div>

    <div class="campo">
      <label>Dirección *</label>
      <input type="text" [(ngModel)]="form.direccion" placeholder="Tu dirección" />
      <small class="error" *ngIf="errores.direccion">{{ errores.direccion }}</small>
    </div>

    <div class="campo">
      <label>Fecha de Nacimiento *</label>
      <input type="date" [(ngModel)]="form.fechaNacimiento" />
      <small class="error" *ngIf="errores.fechaNacimiento">{{ errores.fechaNacimiento }}</small>
    </div>

    <div class="campo">
      <label>Teléfono *</label>
      <input type="tel" [(ngModel)]="form.telefono" placeholder="10 dígitos" maxlength="10"
        (keypress)="$event.charCode >= 48 && $event.charCode <= 57" />
      <small class="error" *ngIf="errores.telefono">{{ errores.telefono }}</small>
    </div>

    <!-- Contraseña con toggle -->
    <div class="campo">
      <label>Contraseña *</label>
      <div class="input-password-wrapper">
        <input
          [type]="mostrarPassword ? 'text' : 'password'"
          [(ngModel)]="form.password"
          placeholder="Contraseña"
        />
        <button
          type="button"
          class="btn-ojo"
          (click)="mostrarPassword = !mostrarPassword"
          [attr.aria-label]="mostrarPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
        >
          <!-- Ojo abierto -->
          <svg *ngIf="!mostrarPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <!-- Ojo tachado -->
          <svg *ngIf="mostrarPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
      <small class="error" *ngIf="errores.password">{{ errores.password }}</small>
    </div>

    <!-- Confirmar contraseña con toggle -->
    <div class="campo">
      <label>Confirmar Contraseña *</label>
      <div class="input-password-wrapper">
        <input
          [type]="mostrarConfirmPassword ? 'text' : 'password'"
          [(ngModel)]="form.confirmPassword"
          placeholder="Confirma tu contraseña"
        />
        <button
          type="button"
          class="btn-ojo"
          (click)="mostrarConfirmPassword = !mostrarConfirmPassword"
          [attr.aria-label]="mostrarConfirmPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
        >
          <svg *ngIf="!mostrarConfirmPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="mostrarConfirmPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
      <small class="error" *ngIf="errores.confirmPassword">{{ errores.confirmPassword }}</small>
    </div>

    <button class="btn-morado" (click)="registrar()">Registrarse</button>

    <p class="link">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
  </div>
</div>
