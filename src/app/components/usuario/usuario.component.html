<!-- Navbar (incluye slidebar) -->
<app-navbar titulo="Perfil"></app-navbar>

<!-- Contenido principal -->
<div class="page-wrapper">

  <!-- Botón volver -->
  <div class="page-header">
    <p-button icon="pi pi-arrow-left" label="Volver" severity="secondary" (onClick)="volver()"></p-button>
  </div>

  <!-- Card de perfil -->
  <div class="card-centrada">
    <p-card>

      <ng-template pTemplate="header">
        <div class="perfil-header">
          <p-avatar image="https://storage.waifuwall.com/preview/1038.webp" shape="circle" size="xlarge"></p-avatar>
          <h3 class="perfil-nombre">{{ usuario.nombreCompleto }}</h3>
          <p-tag value="Administrador" severity="info"></p-tag>
        </div>
      </ng-template>

      <p-divider align="center">
        <span class="divider-label">Información personal</span>
      </p-divider>

      <p-table [value]="datosUsuario" styleClass="p-datatable-sm">
        <ng-template pTemplate="body" let-dato>
          <tr>
            <td class="tabla-campo">
              <i [class]="dato.icon" class="tabla-icon"></i>
              {{ dato.campo }}
            </td>
            <td>{{ dato.valor }}</td>
          </tr>
        </ng-template>
      </p-table>

      <p-divider align="center">
        <span class="divider-label">Acciones</span>
      </p-divider>

      <div class="acciones">
        <p-button label="Editar perfil" icon="pi pi-pencil" severity="info" (onClick)="abrirEdicion()"></p-button>
        <p-button label="Cambiar contraseña" icon="pi pi-lock" severity="warn" (onClick)="abrirCambioPassword()"></p-button>
        <p-button label="Cerrar sesión" icon="pi pi-sign-out" severity="danger" (onClick)="cerrarSesion()"></p-button>
      </div>

    </p-card>
  </div>

</div>

<!-- Modal Editar Perfil -->
<p-dialog header="Editar Perfil" [(visible)]="modalEdicionVisible" [modal]="true" [draggable]="false" [resizable]="false" [style]="{ width: '500px' }">

  <div class="modal-form">

    <div class="form-campo">
      <label class="form-label">Usuario</label>
      <input pInputText [(ngModel)]="formEdicion.usuario" placeholder="Nombre de usuario" class="form-input" />
    </div>

    <div class="form-campo">
      <label class="form-label">Nombre Completo</label>
      <input pInputText [(ngModel)]="formEdicion.nombreCompleto" placeholder="Nombre completo" class="form-input" />
    </div>

    <div class="form-campo">
      <label class="form-label">Email</label>
      <input pInputText [(ngModel)]="formEdicion.email" placeholder="correo@ejemplo.com" class="form-input" />
    </div>

    <div class="form-campo">
      <label class="form-label">Teléfono</label>
      <input pInputText [(ngModel)]="formEdicion.telefono" placeholder="10 dígitos" maxlength="10" class="form-input" />
    </div>

    <div class="form-campo">
      <label class="form-label">Dirección</label>
      <input pInputText [(ngModel)]="formEdicion.direccion" placeholder="Tu dirección" class="form-input" />
    </div>

    <div class="form-campo">
      <label class="form-label">Fecha de Nacimiento</label>
      <p-datepicker [(ngModel)]="formEdicion.fechaNacimiento" dateFormat="yy-mm-dd" [showIcon]="true" styleClass="form-input"></p-datepicker>
    </div>

  </div>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" icon="pi pi-times" severity="danger" (onClick)="modalEdicionVisible = false"></p-button>
    <p-button label="Guardar cambios" icon="pi pi-check" (onClick)="guardarEdicion()"></p-button>
  </ng-template>

</p-dialog>

<!-- Modal Cambiar Contraseña -->
<p-dialog header="Cambiar Contraseña" [(visible)]="modalPasswordVisible" [modal]="true" [draggable]="false" [resizable]="false" [style]="{ width: '420px' }">

  <div class="modal-form">

    <div class="form-campo">
      <label class="form-label">Contraseña actual</label>
      <p-password [(ngModel)]="formPassword.actual" placeholder="Contraseña actual" [toggleMask]="true" [feedback]="false" styleClass="form-input"></p-password>
      <small class="p-error" *ngIf="erroresPassword.actual">{{ erroresPassword.actual }}</small>
    </div>

    <div class="form-campo">
      <label class="form-label">Nueva contraseña</label>
      <p-password [(ngModel)]="formPassword.nueva" placeholder="Nueva contraseña" [toggleMask]="true" [feedback]="true" styleClass="form-input"></p-password>
      <small class="p-error" *ngIf="erroresPassword.nueva">{{ erroresPassword.nueva }}</small>
    </div>

    <div class="form-campo">
      <label class="form-label">Confirmar nueva contraseña</label>
      <p-password [(ngModel)]="formPassword.confirmar" placeholder="Confirma la nueva contraseña" [toggleMask]="true" [feedback]="false" styleClass="form-input"></p-password>
      <small class="p-error" *ngIf="erroresPassword.confirmar">{{ erroresPassword.confirmar }}</small>
    </div>

  </div>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" icon="pi pi-times" severity="danger" (onClick)="modalPasswordVisible = false"></p-button>
    <p-button label="Cambiar contraseña" icon="pi pi-check" severity="warn" (onClick)="guardarPassword()"></p-button>
  </ng-template>

</p-dialog>

<p-toast></p-toast>
